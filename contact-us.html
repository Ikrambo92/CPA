<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.css'
        integrity='sha512-Z0kTB03S7BU+JFU0nw9mjSBcRnZm2Bvm0tzOX9/OuOuz01XQfOpa0w/N9u6Jf2f1OAdegdIPWZ9nIZZ+keEvBw=='
        crossorigin='anonymous' />
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.css'
        integrity='sha512-lp6wLpq/o3UVdgb9txVgXUTsvs0Fj1YfelAbza2Kl/aQHbNnfTYPMLiQRvy3i+3IigMby34mtcvcrh31U50nRw=='
        crossorigin='anonymous' />
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>CPA | Contact Us</title>
</head>

<body>
    <!-- Navbar Section -->
    <div class="container-fluid">
        <div class="circle"></div>
        <header class="header">
            <img class="logo" src="./images/logo.png" alt="logo">
        
            <div class="hamburger-menu">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>
        
            <ul class="navlist">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Company</a></li>
                <li><a href="#">Services</a></li>
            </ul>
        
            <div class="contact-bttn"><a href="contact-us.html"><button class="contact-btn">Contact</button></a></div>
        </header>


        <section class="contact-section">
            <div class="contact-heading">
                <h2>Contact Us</h2>
                <h5>We would love to respond to your queries, feel free to get in touch</h5>
            </div>
            <div class="contact-container">
                <div class="contact-details">
                    <h6>Send your request</h6>
                    <form onsubmit="sendEmail(); reset(); return false;">
                        <div class="input-row">
                            <label for="name">Name:
                                <input type="text" id="name" name="name" required></label>

                            <label for="phone">Phone Number:
                                <input type="tel" id="phone" name="phone" required></label>

                        </div>

                        <div class="input-row">
                            <label for="email">Email:
                                <input type="email" id="email" name="email" required></label>

                            <label for="subject">Subject:
                                <input type="text" id="subject" name="subject" required></label>
                        </div>

                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="4" required></textarea>

                        <button type="submit">Submit</button>
                    </form>
                </div>
                <div class="map-details">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d701.2394393212265!2d-2.1641560365264674!3d53.409924066138856!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x487bb379743410ff%3A0xd53f784db07ab3a8!2sBeckwith%20House%20(Orbit%20Developments)!5e0!3m2!1sen!2suk!4v1689172469257!5m2!1sen!2suk"
                        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </section>


        <footer>
            <div class="footer-container">
                <ul>
                    <li><a href="faq.html">FAQ</a></li>
                    <li><a href="contact-us.html">Contact Us</a></li>
                    <li><a href="#">Sitemap</a></li>
                </ul>
                <ul>
                    <li><a href="./toc.pdf">Terms of Service</a></li>
                    <li><a href="./pp.html">Privacy Policy</a></li>
                </ul>
                <ul>
                    <li><a href="#"></a>LinkedIn <i class="fa-brands fa-linkedin-in"></i></li>
                    <li><a href="#"></a>Twitter <i class="fa-brands fa-square-twitter"></i></li>
                    <li><a href="#"></a>Instagram <i class="fa-brands fa-instagram"></i></li>
                </ul>
        
            </div>
        </footer>
    </div>
    <script src="https://apis.google.com/js/platform.js"></script>
    <script>
        function sendEmail() {
            const email = {
                to: 'info@cheshirepropertyadvisers.com',
                from: '',
                subject: 'New Contact Form Enquiry',
                body: 'Name: ' + document.getElementById('name').value
                    + '<br> Email: ' + document.getElementById('email').value
            };
            gapi.auth2.getAuthInstance().signIn({
                scope: 'https://www.googleapis.com/auth/gmail.send'
            }).then(async (auth) => {
                const gmail = google.gmail('v1');
                await gmail.users().messages().send({
                    auth: auth,
                    body: email.body,
                    from: email.from,
                    to: email.to,
                    subject: email.subject
                }).execute();
                alert('Email sent!');
            });
        }
    </script>
</body>

</html>
